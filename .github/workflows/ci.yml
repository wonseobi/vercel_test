name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Apply migrations + seed
        run: supabase db reset --no-confirm

      - name: Stop Supabase
        if: always()
        run: supabase stop
