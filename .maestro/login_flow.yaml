appId: com.example.configflags.staging
---
- launchApp:
    clearState: true

- assertVisible:
    id: "env-badge"
- assertVisible: "Config Flags"

- tapOn:
    id: "email-input"
- inputText: "premium@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"

- assertVisible:
    id: "flags-list"

- assertVisible:
    id: "flag-premium_analytics"
- assertNotVisible:
    id: "flag-beta_ai_assistant"

# relaunch without clearing state to confirm the session persisted
- launchApp:
    clearState: false
- assertVisible:
    id: "flags-list"
